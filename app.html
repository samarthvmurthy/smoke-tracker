<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoke Free</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
<style>
  :root {
    --bg:#080808; --surface:#101010; --border:#1c1c1c; --border2:#282828;
    --accent:#c8f560; --accent-dim:#7a9938; --accent-glow:rgba(200,245,96,0.12);
    --text:#e0e0e0; --muted2:#666; --danger:#ff4455; --success:#60f5a0;
    --gold:#f5c842; --silver:#a0a8b0; --bronze:#c87832;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; flex-direction:column; }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:9998;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }
  #loadingScreen {
    position:fixed; inset:0; background:var(--bg); z-index:999;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:6px; color:var(--muted2);
  }
  .nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:54px; border-bottom:1px solid var(--border);
    background:var(--surface); position:sticky; top:0; z-index:100;
  }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:5px; color:var(--accent); }
  .nav-right { display:flex; align-items:center; gap:14px; font-size:11px; color:var(--muted2); }
  .nav-user { color:var(--text); letter-spacing:1px; }
  .btn-ghost { background:none; border:1px solid var(--border2); color:var(--muted2); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:6px 12px; border-radius:2px; cursor:pointer; transition:all 0.2s; }
  .btn-ghost:hover { border-color:var(--muted2); color:var(--text); }
  .tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); padding:0 24px; overflow-x:auto; }
  .tab { padding:12px 20px; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); cursor:pointer; border-bottom:2px solid transparent; border-top:none; border-left:none; border-right:none; background:none; font-family:'DM Mono',monospace; transition:all 0.2s; white-space:nowrap; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .content { flex:1; padding:28px 24px 60px; max-width:580px; width:100%; margin:0 auto; }
  .panel { display:none; }
  .panel.active { display:block; animation:fadeUp 0.3s ease both; }

  /* Timer */
  .timer-card { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:36px 28px 28px; text-align:center; position:relative; margin-bottom:24px; }
  .timer-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
  .timer-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); margin-bottom:16px; }
  .timer-display { font-family:'Bebas Neue',sans-serif; font-size:clamp(60px,15vw,92px); letter-spacing:4px; line-height:1; color:var(--accent); text-shadow:0 0 60px var(--accent-glow); min-height:96px; display:flex; align-items:center; justify-content:center; transition:color 0.3s; }
  .timer-display.idle { color:var(--muted2); text-shadow:none; }
  .timer-since { font-size:11px; color:var(--muted2); margin-top:10px; letter-spacing:1px; min-height:18px; }
  .timer-controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:24px; }
  .ctrl-btn { padding:14px 10px; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; border-radius:2px; cursor:pointer; border:none; transition:all 0.2s; }
  .ctrl-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .btn-start  { background:var(--accent); color:#080808; }
  .btn-start:hover:not(:disabled) { opacity:0.88; }
  .btn-stop   { background:transparent; border:1px solid var(--border2) !important; color:var(--muted2); }
  .btn-stop:hover:not(:disabled) { border-color:var(--muted2) !important; color:var(--text); }
  .btn-smoked { background:transparent; border:1px solid var(--danger) !important; color:var(--danger); }
  .btn-smoked:hover:not(:disabled) { background:var(--danger); color:#080808; }
  .status-msg { font-size:10px; letter-spacing:2px; color:var(--muted2); text-align:center; margin-top:12px; min-height:14px; text-transform:uppercase; }

  /* Log */
  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .section-title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); }
  .link-btn { background:none; border:none; color:var(--muted2); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; text-decoration:underline; transition:color 0.2s; }
  .link-btn:hover { color:var(--danger); }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:14px; text-align:center; }
  .stat-val { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:var(--text); }
  .stat-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted2); margin-top:2px; }
  .log-list { display:flex; flex-direction:column; gap:8px; }
  .log-item { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:12px 16px; display:grid; grid-template-columns:28px 1fr auto; align-items:center; gap:12px; }
  .log-item.is-best { border-color:var(--accent-dim); }
  .log-num { font-size:10px; color:var(--muted2); letter-spacing:1px; }
  .log-dur { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--accent); }
  .log-dur.best { color:var(--success); }
  .log-dates { font-size:10px; color:var(--muted2); text-align:right; line-height:1.8; }
  .empty-state { text-align:center; padding:28px; color:var(--muted2); font-size:11px; letter-spacing:2px; text-transform:uppercase; border:1px dashed var(--border2); border-radius:2px; }

  /* Friends */
  .add-row { display:flex; gap:10px; margin-bottom:8px; }
  .add-row input { flex:1; background:#0a0a0a; border:1px solid var(--border2); border-radius:2px; padding:10px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:12px; outline:none; transition:border-color 0.2s; }
  .add-row input:focus { border-color:var(--accent-dim); }
  .add-row input::placeholder { color:var(--muted2); opacity:0.5; }
  .btn-sm { padding:10px 18px; background:var(--accent); color:#080808; border:none; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; cursor:pointer; border-radius:2px; transition:opacity 0.2s; white-space:nowrap; }
  .btn-sm:hover { opacity:0.88; }
  .inline-msg { font-size:11px; min-height:16px; margin-bottom:16px; letter-spacing:0.5px; }
  .inline-msg.error { color:var(--danger); } .inline-msg.success { color:var(--success); }
  .subsection { margin-bottom:28px; }
  .subsection-title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted2); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .friend-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:16px 20px; margin-bottom:8px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; position:relative; overflow:hidden; }
  .friend-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--accent-dim); }
  .friend-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:var(--accent); }
  .friend-timer { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--text); }
  .friend-meta { font-size:10px; color:var(--muted2); letter-spacing:1px; margin-top:3px; }
  .request-card { background:var(--surface); border:1px solid var(--border2); border-radius:3px; padding:14px 20px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .request-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--text); }
  .request-meta { font-size:10px; color:var(--muted2); margin-top:2px; letter-spacing:1px; }
  .request-actions { display:flex; gap:8px; }
  .btn-accept  { padding:7px 14px; background:var(--accent); color:#080808; border:none; font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; cursor:pointer; border-radius:2px; }
  .btn-accept:hover { opacity:0.88; }
  .btn-decline { padding:7px 14px; background:transparent; color:var(--muted2); border:1px solid var(--border2); font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; cursor:pointer; border-radius:2px; transition:all 0.2s; }
  .btn-decline:hover { border-color:var(--danger); color:var(--danger); }
  .btn-remove  { background:none; border:none; color:var(--muted2); cursor:pointer; font-size:14px; padding:4px 8px; transition:color 0.2s; }
  .btn-remove:hover { color:var(--danger); }

  /* Leaderboard */
  .lb-item { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:16px 20px; margin-bottom:8px; display:grid; grid-template-columns:44px 1fr auto; align-items:center; gap:12px; }
  .lb-item.is-me { border-color:var(--accent-dim); background:rgba(200,245,96,0.02); }
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; text-align:center; }
  .rank-1{color:var(--gold)} .rank-2{color:var(--silver)} .rank-3{color:var(--bronze)} .rank-n{color:var(--muted2)}
  .lb-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--text); }
  .lb-name.is-me { color:var(--accent); }
  .lb-sub { font-size:9px; color:var(--muted2); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
  .lb-time { text-align:right; }
  .lb-dur  { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--text); }
  .lb-since{ font-size:9px; color:var(--muted2); letter-spacing:1px; margin-top:2px; }

  /* Modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:500; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .overlay.active { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:32px; max-width:340px; width:90%; text-align:center; transform:scale(0.95); transition:transform 0.2s; position:relative; }
  .modal::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
  .overlay.active .modal { transform:scale(1); }
  .modal-icon { font-size:36px; margin-bottom:10px; }
  .modal h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:var(--accent); margin-bottom:8px; }
  .modal p { font-size:11px; color:var(--muted2); line-height:1.8; margin-bottom:16px; }
  .modal-time { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:3px; color:var(--text); margin-bottom:24px; }
  .modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn-confirm { padding:13px; background:var(--accent); color:#080808; border:none; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:3px; cursor:pointer; border-radius:2px; }
  .btn-confirm:hover { opacity:0.85; }
  .btn-cancel  { padding:13px; background:transparent; color:var(--muted2); border:1px solid var(--border2); font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:3px; cursor:pointer; border-radius:2px; transition:all 0.2s; }
  .btn-cancel:hover { border-color:var(--muted2); color:var(--text); }
  .loading { text-align:center; padding:32px; font-size:11px; letter-spacing:3px; color:var(--muted2); text-transform:uppercase; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse {
    0%,100%{text-shadow:0 0 60px rgba(200,245,96,0.12)}
    50%{text-shadow:0 0 100px rgba(200,245,96,0.45)}
  }
  .pulsing { animation:pulse 1s ease 4; }
</style>
</head>
<body>

<div id="loadingScreen">LOADING...</div>

<nav class="nav">
  <div class="nav-logo">SF</div>
  <div class="nav-right">
    <span>@<span id="navUser" class="nav-user">—</span></span>
    <button class="btn-ghost" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<div class="tabs">
  <button class="tab active" id="tab-tracker"     onclick="switchTab('tracker')">Tracker</button>
  <button class="tab"        id="tab-friends"     onclick="switchTab('friends')">Friends <span id="reqBadge" style="display:none;color:var(--danger);margin-left:4px">●</span></button>
  <button class="tab"        id="tab-leaderboard" onclick="switchTab('leaderboard')">Leaderboard</button>
</div>

<div class="content">

  <!-- TRACKER -->
  <div class="panel active" id="panel-tracker">
    <div class="timer-card">
      <div class="timer-label">Time since last cigarette</div>
      <div class="timer-display idle" id="timerDisplay">--:--:--</div>
      <div class="timer-since" id="timerSince"></div>
      <div class="timer-controls">
        <button class="ctrl-btn btn-start"  id="btnStart"  onclick="startTimer()">▶ Start</button>
        <button class="ctrl-btn btn-stop"   id="btnStop"   onclick="stopTimer()"      disabled>■ Stop</button>
        <button class="ctrl-btn btn-smoked" id="btnSmoked" onclick="openSmokeModal()" disabled>🚬 Smoked</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
    <div class="section-header">
      <span class="section-title">Resistance Log</span>
      <button class="link-btn" onclick="clearLog()">Clear all</button>
    </div>
    <div class="stats-grid" id="statsGrid" style="display:none">
      <div class="stat-box"><div class="stat-val" id="statCount">0</div><div class="stat-lbl">Sessions</div></div>
      <div class="stat-box"><div class="stat-val" id="statBest">—</div><div class="stat-lbl">Personal Best</div></div>
    </div>
    <div id="logContainer"></div>
  </div>

  <!-- FRIENDS -->
  <div class="panel" id="panel-friends">
    <div class="subsection">
      <div class="subsection-title">Add Friend</div>
      <div class="add-row">
        <input type="text" id="friendInput" placeholder="Enter username..." onkeydown="if(event.key==='Enter')sendFriendRequest()" />
        <button class="btn-sm" onclick="sendFriendRequest()">Send</button>
      </div>
      <div class="inline-msg" id="friendMsg"></div>
    </div>
    <div class="subsection" id="incomingSection" style="display:none">
      <div class="subsection-title">Incoming Requests</div>
      <div id="incomingList"></div>
    </div>
    <div class="subsection">
      <div class="subsection-title">My Friends</div>
      <div id="friendsList"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="panel" id="panel-leaderboard">
    <div id="lbContainer"><div class="loading">Loading...</div></div>
  </div>

</div>

<!-- Smoke modal -->
<div class="overlay" id="smokeOverlay">
  <div class="modal">
    <div class="modal-icon">🚬</div>
    <h2>Log a smoke?</h2>
    <p>Records your resistance time, resets and continues the timer.</p>
    <div class="modal-time" id="modalTime">—</div>
    <div class="modal-btns">
      <button class="btn-cancel"  onclick="closeSmokeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmSmoke()">Log it</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://vtlivesjwzinffceeriv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0bGl2ZXNqd3ppbmZmY2Vlcml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NDE3NTYsImV4cCI6MjA4ODQxNzc1Nn0.5tYWbarj_zeS2TCTbxFinBhDCHHq3hcUfM1azKOGdpA';

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY, {
  auth: { persistSession:true, detectSessionInUrl:true, autoRefreshToken:true, lock:async(_,__,fn)=>fn() }
});

// ── State (JS only handles live ticking) ──
let _user        = null;
let _profile     = null;
let _openSession = null;  // the current open DB session row
let _tickInterval  = null;
let _friendTimers  = {};

// ── Helpers ──
const fmtDuration = ms => {
  if (!ms || ms < 0) return '00:00:00';
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
};
const fmtShort = ms => {
  if (!ms || ms < 0) return '0s';
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if (h >= 24) return `${Math.floor(h/24)}d ${h%24}h ${String(m).padStart(2,'0')}m`;
  if (h > 0)   return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0)   return `${m}m ${String(sec).padStart(2,'0')}s`;
  return `${sec}s`;
};
const fmtDate = ts => ts
  ? new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
  : '—';

function setStatus(msg, color) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg; el.style.color = color || 'var(--muted2)';
  if (msg) setTimeout(() => { if (el.textContent===msg) el.textContent=''; }, 3000);
}

// ── Auth guard ──
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') {
    window.location.href = 'index.html';
  }
});

// ── Bootstrap: pull everything from DB ──
async function bootstrap(user) {
  _user = user;
  try {
    const { data:profile } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    _profile = profile;
    document.getElementById('navUser').textContent = profile?.username || user.email;

    await syncTimerFromDB();
    await loadLog();
    await checkIncomingRequests();
  } catch(e) {
    console.error('Bootstrap error:', e);
  } finally {
    document.getElementById('loadingScreen').style.display = 'none';
  }
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (!session?.user) { window.location.href = 'index.html'; return; }
  if (!_user) bootstrap(session.user);
});

// ── Pull open session from DB and start ticking if found ──
async function syncTimerFromDB() {
  const { data:open } = await sb
    .from('sessions')
    .select('*')
    .eq('user_id', _user.id)
    .is('end_time', null)
    .order('start_time', { ascending: false })
    .limit(1);

  clearInterval(_tickInterval);

  if (open && open.length > 0) {
    _openSession = open[0];
    startTicking(_openSession.start_time);
  } else {
    _openSession = null;
    setIdleUI();
  }
}

// ── Tick the display (pure JS, no DB) ──
function startTicking(startTime) {
  const disp  = document.getElementById('timerDisplay');
  const since = document.getElementById('timerSince');
  disp.classList.remove('idle');
  document.getElementById('btnStart').disabled  = true;
  document.getElementById('btnStop').disabled   = false;
  document.getElementById('btnSmoked').disabled = false;

  clearInterval(_tickInterval);
  _tickInterval = setInterval(() => {
    disp.textContent  = fmtDuration(Date.now() - startTime);
    since.textContent = `Since ${fmtDate(startTime)}`;
  }, 1000);
}

function setIdleUI() {
  clearInterval(_tickInterval);
  document.getElementById('timerDisplay').textContent = '--:--:--';
  document.getElementById('timerDisplay').classList.add('idle');
  document.getElementById('timerSince').textContent   = '';
  document.getElementById('btnStart').disabled  = false;
  document.getElementById('btnStop').disabled   = true;
  document.getElementById('btnSmoked').disabled = true;
}

// ── START: insert open session row in DB ──
async function startTimer() {
  if (_openSession) return;
  document.getElementById('btnStart').disabled = true;
  setStatus('Starting...');

  const now = Date.now();
  const { data, error } = await sb.from('sessions').insert({
    user_id:    _user.id,
    start_time: now,
    end_time:   null
  }).select().single();

  if (error) {
    setStatus('Failed to start. Try again.', 'var(--danger)');
    document.getElementById('btnStart').disabled = false;
    return;
  }

  _openSession = data;
  startTicking(now);
  setStatus('Timer started');
}

// ── STOP: close the open session row in DB ──
async function stopTimer() {
  if (!_openSession) return;
  document.getElementById('btnStop').disabled = true;
  setStatus('Stopping...');

  const now = Date.now();
  const { error } = await sb.from('sessions')
    .update({ end_time: now })
    .eq('id', _openSession.id);

  if (error) {
    setStatus('Failed to stop. Try again.', 'var(--danger)');
    document.getElementById('btnStop').disabled = false;
    return;
  }

  _openSession = null;
  setIdleUI();
  setStatus('Timer stopped');
  await loadLog();
}

// ── SMOKED modal ──
function openSmokeModal() {
  if (!_openSession) return;
  const elapsed = Date.now() - _openSession.start_time;
  document.getElementById('modalTime').textContent = fmtShort(elapsed);
  document.getElementById('smokeOverlay').classList.add('active');
}

function closeSmokeModal() {
  document.getElementById('smokeOverlay').classList.remove('active');
}

// ── SMOKED confirm: close current session + open new one ──
async function confirmSmoke() {
  closeSmokeModal();
  if (!_openSession) return;

  const now = Date.now();
  document.getElementById('btnSmoked').disabled = true;
  setStatus('Saving...');

  // 1. Close the current open session
  const { error:closeErr } = await sb.from('sessions')
    .update({ end_time: now })
    .eq('id', _openSession.id);

  if (closeErr) {
    setStatus('Failed to save. Try again.', 'var(--danger)');
    document.getElementById('btnSmoked').disabled = false;
    return;
  }

  // 2. Open a new session immediately (timer keeps running)
  const { data:newSession, error:openErr } = await sb.from('sessions').insert({
    user_id:    _user.id,
    start_time: now,
    end_time:   null
  }).select().single();

  if (openErr) {
    setStatus('Smoke logged but new timer failed. Press Start.', 'var(--danger)');
    _openSession = null;
    setIdleUI();
    await loadLog();
    return;
  }

  _openSession = newSession;

  // Pulse the display
  const disp = document.getElementById('timerDisplay');
  disp.classList.remove('pulsing');
  void disp.offsetWidth;
  disp.classList.add('pulsing');
  setTimeout(() => disp.classList.remove('pulsing'), 4000);

  startTicking(now);
  document.getElementById('btnSmoked').disabled = false;
  setStatus('Logged ✓', 'var(--success)');
  await loadLog();
}

// ── LOG: pull all closed sessions from DB ──
async function loadLog() {
  const { data:sessions } = await sb
    .from('sessions')
    .select('*')
    .eq('user_id', _user.id)
    .not('end_time', 'is', null)
    .order('end_time', { ascending: false });

  const container = document.getElementById('logContainer');
  const statsGrid = document.getElementById('statsGrid');

  if (!sessions || sessions.length === 0) {
    container.innerHTML = '<div class="empty-state">No sessions logged yet</div>';
    statsGrid.style.display = 'none';
    return;
  }

  statsGrid.style.display = 'grid';
  const durations = sessions.map(s => s.end_time - s.start_time);
  const best = Math.max(...durations);
  document.getElementById('statCount').textContent = sessions.length;
  document.getElementById('statBest').textContent  = fmtShort(best);

  container.innerHTML = '<div class="log-list">' + sessions.map((s, i) => {
    const dur    = s.end_time - s.start_time;
    const isBest = dur === best;
    return `<div class="log-item ${isBest?'is-best':''}">
      <span class="log-num">#${sessions.length - i}</span>
      <span class="log-dur ${isBest?'best':''}">${fmtDuration(dur)}${isBest?' 🏆':''}</span>
      <span class="log-dates">${fmtDate(s.start_time)} →<br>${fmtDate(s.end_time)}</span>
    </div>`;
  }).join('') + '</div>';
}

async function clearLog() {
  if (!confirm('Clear all logged sessions? Your timer keeps running.')) return;
  await sb.from('sessions').delete().eq('user_id', _user.id).not('end_time', 'is', null);
  setStatus('Cleared ✓', 'var(--success)');
  await loadLog();
}

// ── FRIENDS ──
async function sendFriendRequest() {
  const input  = document.getElementById('friendInput');
  const msgEl  = document.getElementById('friendMsg');
  const uname  = input.value.trim().toLowerCase();
  msgEl.textContent=''; msgEl.className='inline-msg';

  if (!uname) { msgEl.textContent='Enter a username.'; msgEl.className='inline-msg error'; return; }
  if (uname === _profile.username) { msgEl.textContent="You can't add yourself."; msgEl.className='inline-msg error'; return; }

  const { data:target } = await sb.from('profiles').select('id').eq('username', uname).maybeSingle();
  if (!target) { msgEl.textContent=`User @${uname} not found.`; msgEl.className='inline-msg error'; return; }

  const { data:s1 } = await sb.from('friendships').select('id,status').eq('user_id',_user.id).eq('friend_id',target.id).maybeSingle();
  const { data:s2 } = await sb.from('friendships').select('id,status').eq('user_id',target.id).eq('friend_id',_user.id).maybeSingle();
  const existing = s1 || s2;
  if (existing) {
    msgEl.textContent = existing.status==='accepted' ? 'Already friends.' : 'Request already sent.';
    msgEl.className='inline-msg error'; return;
  }

  const { error } = await sb.from('friendships').insert({ user_id:_user.id, friend_id:target.id, status:'pending' });
  if (error) { msgEl.textContent='Something went wrong. Try again.'; msgEl.className='inline-msg error'; return; }

  input.value='';
  msgEl.textContent=`✓ Request sent to @${uname}!`; msgEl.className='inline-msg success';
  setTimeout(() => { msgEl.textContent=''; }, 3000);
}

async function acceptRequest(id) {
  await sb.from('friendships').update({ status:'accepted' }).eq('id', id);
  await loadFriends();
}

async function declineRequest(id) {
  await sb.from('friendships').delete().eq('id', id);
  await loadFriends();
}

async function removeFriend(fid, uname) {
  if (!confirm(`Remove @${uname}?`)) return;
  await sb.from('friendships').delete().eq('user_id',_user.id).eq('friend_id',fid);
  await sb.from('friendships').delete().eq('user_id',fid).eq('friend_id',_user.id);
  clearInterval(_friendTimers[fid]); delete _friendTimers[fid];
  await loadFriends();
}

async function checkIncomingRequests() {
  const { data } = await sb.from('friendships').select('id').eq('friend_id',_user.id).eq('status','pending');
  document.getElementById('reqBadge').style.display = data&&data.length>0 ? 'inline' : 'none';
}

async function loadFriends() {
  Object.values(_friendTimers).forEach(clearInterval); _friendTimers={};

  // Incoming pending requests
  const { data:incoming } = await sb.from('friendships').select('id,user_id,created_at').eq('friend_id',_user.id).eq('status','pending');
  const enriched=[];
  for (const r of (incoming||[])) {
    const { data:p } = await sb.from('profiles').select('username').eq('id',r.user_id).maybeSingle();
    if (p) enriched.push({...r, username:p.username});
  }

  const incomingSec = document.getElementById('incomingSection');
  const badge       = document.getElementById('reqBadge');
  if (enriched.length > 0) {
    incomingSec.style.display='block'; badge.style.display='inline';
    document.getElementById('incomingList').innerHTML = enriched.map(r=>`
      <div class="request-card">
        <div><div class="request-name">@${r.username}</div><div class="request-meta">Sent ${fmtDate(new Date(r.created_at).getTime())}</div></div>
        <div class="request-actions">
          <button class="btn-accept"  onclick="acceptRequest('${r.id}')">Accept</button>
          <button class="btn-decline" onclick="declineRequest('${r.id}')">Decline</button>
        </div>
      </div>`).join('');
  } else { incomingSec.style.display='none'; badge.style.display='none'; }

  // Accepted friends both directions
  const { data:sent }     = await sb.from('friendships').select('friend_id').eq('user_id',_user.id).eq('status','accepted');
  const { data:received } = await sb.from('friendships').select('user_id').eq('friend_id',_user.id).eq('status','accepted');
  const fids = [...(sent||[]).map(f=>f.friend_id), ...(received||[]).map(f=>f.user_id)];

  const list = document.getElementById('friendsList');
  if (fids.length === 0) { list.innerHTML='<div class="empty-state">No friends yet — send a request above</div>'; return; }
  list.innerHTML='';

  for (const fid of fids) {
    const { data:p } = await sb.from('profiles').select('username').eq('id',fid).maybeSingle();
    if (!p) continue;

    // Pull their open session from DB
    const { data:openSess } = await sb.from('sessions')
      .select('start_time')
      .eq('user_id', fid)
      .is('end_time', null)
      .order('start_time', { ascending:false })
      .limit(1);

    const sinceTs = openSess&&openSess.length>0 ? openSess[0].start_time : null;

    const card = document.createElement('div');
    card.className='friend-card';
    card.innerHTML=`
      <div>
        <div class="friend-name">@${p.username}</div>
        <div class="friend-timer" id="ft-${fid}">${sinceTs ? fmtDuration(Date.now()-sinceTs) : '—'}</div>
        <div class="friend-meta">${sinceTs ? 'Since '+fmtDate(sinceTs) : 'No active session'}</div>
      </div>
      <button class="btn-remove" onclick="removeFriend('${fid}','${p.username}')" title="Remove">✕</button>`;
    list.appendChild(card);

    if (sinceTs) {
      _friendTimers[fid] = setInterval(() => {
        const el = document.getElementById(`ft-${fid}`);
        if (el) el.textContent = fmtDuration(Date.now()-sinceTs);
      }, 1000);
    }
  }
}

// ── LEADERBOARD ──
async function loadLeaderboard() {
  const c = document.getElementById('lbContainer');
  c.innerHTML='<div class="loading">Loading...</div>';

  const { data:fs } = await sb.from('friendships')
    .select('user_id,friend_id')
    .or(`user_id.eq.${_user.id},friend_id.eq.${_user.id}`)
    .eq('status','accepted');

  const ids = new Set([_user.id]);
  (fs||[]).forEach(f => { ids.add(f.user_id); ids.add(f.friend_id); });

  const { data:profiles } = await sb.from('profiles').select('id,username').in('id',[...ids]);

  const entries=[];
  for (const p of (profiles||[])) {
    // Open session → resistance is measured from start_time
    const { data:open } = await sb.from('sessions').select('start_time').eq('user_id',p.id).is('end_time',null).order('start_time',{ascending:false}).limit(1);
    // Last closed session → if no open session, measure from last end_time
    const { data:last } = await sb.from('sessions').select('end_time').eq('user_id',p.id).not('end_time','is',null).order('end_time',{ascending:false}).limit(1);
    const sinceTs = open&&open.length>0 ? open[0].start_time : last&&last.length>0 ? last[0].end_time : null;
    entries.push({ id:p.id, username:p.username, elapsed:sinceTs?Date.now()-sinceTs:0, sinceTs });
  }

  entries.sort((a,b) => b.elapsed - a.elapsed);
  const medals=['🥇','🥈','🥉'];
  c.innerHTML = entries.map((e,i) => `
    <div class="lb-item ${e.id===_user.id?'is-me':''}">
      <div class="lb-rank ${['rank-1','rank-2','rank-3'][i]||'rank-n'}">${i<3?medals[i]:'#'+(i+1)}</div>
      <div>
        <div class="lb-name ${e.id===_user.id?'is-me':''}">@${e.username}</div>
        <div class="lb-sub">${e.id===_user.id?'you':'friend'}</div>
      </div>
      <div class="lb-time">
        <div class="lb-dur">${fmtShort(e.elapsed)}</div>
        <div class="lb-since">${e.sinceTs?'since '+fmtDate(e.sinceTs):'no data'}</div>
      </div>
    </div>`).join('');
}

// ── TABS ──
function switchTab(name) {
  ['tracker','friends','leaderboard'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===name);
    document.getElementById(`panel-${t}`).classList.toggle('active', t===name);
  });
  if (name==='friends')     loadFriends();
  if (name==='leaderboard') loadLeaderboard();
}

// ── LOGOUT ──
async function doLogout() {
  clearInterval(_tickInterval);
  Object.values(_friendTimers).forEach(clearInterval);
  _user=null; _profile=null; _openSession=null; _friendTimers={};
  try { await Promise.race([sb.auth.signOut(), new Promise(r=>setTimeout(r,3000))]); } catch{}
  window.location.href='index.html';
}

// Close modal on backdrop click
document.getElementById('smokeOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('smokeOverlay')) closeSmokeModal();
});
</script>
