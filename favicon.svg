<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#111111"/>
  <!-- Prohibition circle -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#c8f560" stroke-width="2.5"/>
  <!-- Cigarette body -->
  <rect x="7" y="14.5" width="11" height="3" rx="1" fill="#d4d4d4"/>
  <!-- Filter tip -->
  <rect x="18" y="14.5" width="5" height="3" rx="0.5" fill="#c8a055"/>
  <!-- Diagonal ban line -->
  <line x1="6.5" y1="24" x2="25.5" y2="8" stroke="#c8f560" stroke-width="2.5" stroke-linecap="round"/>
</svg>
