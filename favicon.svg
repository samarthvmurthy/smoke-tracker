<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#111111"/>
  <!-- Cigarette body -->
  <rect x="3" y="13" width="17" height="6" rx="2" fill="#d4d4d4"/>
  <!-- Filter tip -->
  <rect x="20" y="13" width="9" height="6" rx="1" fill="#c8a055"/>
  <!-- Burning tip glow -->
  <circle cx="3.5" cy="16" r="2" fill="#ff6b35" opacity="0.9"/>
  <!-- Strike-through line in lime green -->
  <line x1="2" y1="28" x2="30" y2="4" stroke="#c8f560" stroke-width="3" stroke-linecap="round"/>
</svg>
